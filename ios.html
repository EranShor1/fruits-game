<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>חידון פירות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', -apple-system, sans-serif;
  background: linear-gradient(160deg, #e8f0ff 0%, #dce8ff 30%, #f0e8ff 60%, #e8f4ff 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
}

/* Ambient light orbs */
body::before {
  content: '';
  position: fixed;
  top: -60px; left: -60px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,122,255,0.12), transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -40px; right: -40px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(175,82,222,0.1), transparent 70%);
  pointer-events: none;
}

#app {
  width: 360px;
  height: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  perspective: 1000px;
}

#topbar {
  width: 100%;
  padding: 14px 20px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 2;
}

#hearts {
  font-size: 22px;
  letter-spacing: 4px;
  filter: drop-shadow(0 2px 4px rgba(255,59,48,0.35));
}

#score {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 16px;
  font-weight: 700;
  color: #1c1c1e;
  box-shadow:
    0 4px 16px rgba(0,0,0,0.08),
    0 1px 0 rgba(255,255,255,0.9) inset,
    0 -1px 0 rgba(0,0,0,0.06) inset;
}

/* 3D card stage */
.photo-stage {
  margin: 4px 0 12px;
  position: relative;
  z-index: 2;
  perspective: 800px;
}

.photo-card {
  width: 230px;
  height: 230px;
  position: relative;
  transform-style: preserve-3d;
  animation: cardFloat 4s ease-in-out infinite;
}

@keyframes cardFloat {
  0%,100% { transform: rotateX(8deg) rotateY(-6deg) translateZ(0px); }
  33%      { transform: rotateX(4deg) rotateY(6deg) translateZ(8px); }
  66%      { transform: rotateX(10deg) rotateY(0deg) translateZ(4px); }
}

/* Main glass face */
.photo-face {
  position: absolute;
  inset: 0;
  border-radius: 32px;
  overflow: hidden;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.95);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.9) inset,
    0 -2px 0 rgba(0,0,0,0.06) inset,
    2px 0 0 rgba(255,255,255,0.6) inset,
    -2px 0 0 rgba(0,0,0,0.04) inset,
    0 20px 60px rgba(0,0,0,0.14),
    0 8px 24px rgba(0,122,255,0.12),
    0 2px 8px rgba(0,0,0,0.1);
}

/* Top-left gloss shine */
.photo-face::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 65%; height: 45%;
  background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.1) 60%, transparent 100%);
  border-radius: 32px 0 0 0;
  pointer-events: none;
  z-index: 1;
}

/* Bottom rim light */
.photo-face::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  pointer-events: none;
  z-index: 1;
}

#fruit-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 3D depth shadows */
.card-shadow-bottom {
  position: absolute;
  bottom: -14px; left: 8px; right: 8px;
  height: 14px;
  background: linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.02));
  border-radius: 0 0 28px 28px;
  filter: blur(4px);
  transform: scaleX(0.92);
  z-index: -1;
}

.card-hard-shadow {
  position: absolute;
  inset: 16px -4px -20px 4px;
  background: rgba(0,80,200,0.10);
  border-radius: 32px;
  filter: blur(20px);
  z-index: -2;
}

#fruit-name {
  margin-top: 4px;
  text-align: center;
  height: 54px;
  visibility: hidden;
  position: relative;
  z-index: 2;
}
#fruit-name .he { font-size: 26px; font-weight: 700; color: #1c1c1e; }
#fruit-name .en { font-size: 14px; color: #8e8e93; margin-top: 2px; font-weight: 400; }

#question {
  font-size: 17px;
  font-weight: 500;
  color: #3a3a3c;
  text-align: center;
  margin-bottom: 14px;
  letter-spacing: 0.2px;
  position: relative;
  z-index: 2;
}

#answers {
  width: 320px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
  position: relative;
  z-index: 2;
}

.ans-btn {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 18px;
  padding: 18px 12px;
  font-family: 'Heebo', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: #1c1c1e;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.95) inset,
    0 -1px 0 rgba(0,0,0,0.05) inset,
    0 4px 16px rgba(0,0,0,0.07),
    0 1px 4px rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}

/* Gloss on each button */
.ans-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(180deg, rgba(255,255,255,0.5), transparent);
  border-radius: 18px 18px 0 0;
  pointer-events: none;
}

.ans-btn:active {
  transform: scale(0.95) translateY(2px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 2px 8px rgba(0,0,0,0.05);
}

.ans-btn.correct {
  background: linear-gradient(145deg, #3dda64, #28c252);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 -2px 0 rgba(0,0,0,0.15) inset,
    0 6px 20px rgba(40,194,82,0.45),
    0 2px 8px rgba(0,0,0,0.1);
  animation: popCorrect 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.ans-btn.wrong {
  background: linear-gradient(145deg, #ff5046, #e5342a);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.3) inset,
    0 -2px 0 rgba(0,0,0,0.2) inset,
    0 6px 20px rgba(229,52,42,0.45);
  animation: shake 0.38s ease-out;
}

@keyframes popCorrect {
  0%   { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-9px); }
  40%     { transform: translateX(9px); }
  60%     { transform: translateX(-6px); }
  80%     { transform: translateX(6px); }
}

.divider {
  width: 320px;
  height: 0.5px;
  background: rgba(60,60,67,0.1);
  margin: 2px 0 10px;
  position: relative;
  z-index: 2;
}

#next-btn {
  width: 320px;
  background: linear-gradient(175deg, #1a8aff 0%, #0070f0 50%, #005fd4 100%);
  border: none;
  border-radius: 18px;
  padding: 17px;
  font-family: 'Heebo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  position: relative;
  z-index: 2;
  letter-spacing: 0.3px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.25) inset,
    0 -3px 0 rgba(0,0,0,0.25) inset,
    0 8px 24px rgba(0,122,255,0.45),
    0 3px 8px rgba(0,0,0,0.15),
    0 1px 0 #004ab8;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  overflow: hidden;
  display: none;
}

/* Gloss sweep */
#next-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 48%;
  background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent);
  border-radius: 18px 18px 0 0;
  pointer-events: none;
}

#next-btn:active {
  transform: translateY(2px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.2) inset,
    0 -1px 0 rgba(0,0,0,0.2) inset,
    0 4px 12px rgba(0,122,255,0.35),
    0 1px 0 #004ab8;
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="hearts"></div>
    <div id="score">⭐ 0</div>
  </div>
  <div class="photo-stage">
    <div class="photo-card">
      <div class="photo-face">
        <img id="fruit-img" src="" alt="fruit">
      </div>
    </div>
    <div class="card-shadow-bottom"></div>
    <div class="card-hard-shadow"></div>
  </div>
  <div id="fruit-name">
    <div class="he"></div>
    <div class="en"></div>
  </div>
  <div id="question">מה הפרי הזה?</div>
  <div id="answers"></div>
  <div class="divider"></div>
  <button id="next-btn">← הפרי הבא</button>
</div>

<script>
const ALL_FRUITS = [
  { file:'mango.jpg',        he:'מנגו',       en:'Mango' },
  { file:'dragonfruit.jpg',  he:'פיטאיה',     en:'Dragon Fruit' },
  { file:'rambutan.jpg',     he:'רמבוטן',     en:'Rambutan' },
  { file:'lychee.jpg',       he:'ליצ\'י',     en:'Lychee' },
  { file:'starfruit.jpg',    he:'קרמבולה',    en:'Starfruit' },
  { file:'papaya.jpg',       he:'פפאיה',      en:'Papaya' },
  { file:'guava.jpg',        he:'גויאבה',     en:'Guava' },
  { file:'passionfruit.jpg', he:'פסיפלורה',   en:'Passion Fruit' },
  { file:'mangosteen.jpg',   he:'מנגוסטין',   en:'Mangosteen' },
  { file:'longan.jpg',       he:'לונגן',      en:'Longan' },
  { file:'jackfruit.jpg',    he:'ג\'קפרוט',   en:'Jackfruit' },
  { file:'durian.jpg',       he:'דוריאן',     en:'Durian' },
  { file:'feijoa.jpg',       he:'פיג\'ואה',   en:'Feijoa' },
  { file:'persimmon.jpg',    he:'פרסימון',    en:'Persimmon' },
  { file:'nashi.jpg',        he:'נאשי',       en:'Nashi Pear' },
  { file:'kumquat.jpg',      he:'קומקווט',    en:'Kumquat' },
  { file:'pomelo.jpg',       he:'פומלה',      en:'Pomelo' },
  { file:'etrog.jpg',        he:'אתרוג',      en:'Etrog' },
  { file:'pricklypear.jpg',  he:'סברס',       en:'Prickly Pear' },
  { file:'date.jpg',         he:'תמר',        en:'Date' },
  { file:'fig.jpg',          he:'תאנה',       en:'Fig' },
  { file:'pomegranate.jpg',  he:'רימון',      en:'Pomegranate' },
  { file:'quince.jpg',       he:'חבוש',       en:'Quince' },
  { file:'acai.jpg',         he:'אסאי',       en:'Açaí' },
  { file:'pineapple.jpg',    he:'אננס',       en:'Pineapple' },
  { file:'coconut.jpg',      he:'קוקוס',      en:'Coconut' },
  { file:'kiwi.jpg',         he:'קיווי',      en:'Kiwi' },
  { file:'avocado.jpg',      he:'אבוקדו',     en:'Avocado' },
  { file:'lucuma.jpg',       he:'לוקומה',     en:'Lucuma' },
  { file:'sapodilla.jpg',    he:'ספדילה',     en:'Sapodilla' },
  { file:'loquat.jpg',       he:'שסק',        en:'Loquat' },
  { file:'banana.jpg',       he:'בננה',       en:'Banana' },
  { file:'raspberry.jpg',    he:'פטל',        en:'Raspberry' },
  { file:'blueberry.jpg',    he:'אוכמניות',   en:'Blueberry' },
  { file:'cherry.jpg',       he:'דובדבן',     en:'Cherry' },
];

let fruits = [], queue = [], current;
let hearts = 3, score = 0, locked = false;

function checkImages() {
  return Promise.all(ALL_FRUITS.map(f => new Promise(res => {
    const img = new Image();
    img.onload  = () => res(f);
    img.onerror = () => res(null);
    img.src = 'Images/' + f.file;
  }))).then(r => r.filter(Boolean));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextFromQueue() {
  if (!queue.length) queue = shuffle([...fruits]);
  return queue.pop();
}

function startRound() {
  hearts = 3;
  locked = false;
  current = nextFromQueue();

  updateHearts();
  document.getElementById('fruit-img').src = 'Images/' + current.file;
  document.getElementById('fruit-name').style.visibility = 'hidden';
  document.getElementById('next-btn').style.display = 'none';

  const pool = shuffle(fruits.filter(f => f !== current));
  const options = shuffle([current, ...pool.slice(0, 3)]);

  const container = document.getElementById('answers');
  container.innerHTML = '';
  options.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = f.he;
    btn.addEventListener('touchstart', e => { e.preventDefault(); tap(btn, f); }, { passive: false });
    btn.addEventListener('click', () => tap(btn, f));
    container.appendChild(btn);
  });
}

function updateHearts() {
  document.getElementById('hearts').textContent =
    '❤️'.repeat(hearts) + '🤍'.repeat(3 - hearts);
}

function tap(btn, fruit) {
  if (locked) return;
  if (fruit === current) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = '⭐ ' + score;
    locked = true;
    reveal();
    document.getElementById('next-btn').style.display = 'block';
  } else {
    btn.classList.add('wrong');
    hearts--;
    updateHearts();
    setTimeout(() => btn.classList.remove('wrong'), 400);
    if (hearts === 0) {
      locked = true;
      reveal();
      document.getElementById('next-btn').style.display = 'block';
    }
  }
}

function reveal() {
  const el = document.getElementById('fruit-name');
  el.querySelector('.he').textContent = current.he;
  el.querySelector('.en').textContent = current.en;
  el.style.visibility = 'visible';
}

function nextFruit() { startRound(); }

const nextBtn = document.getElementById('next-btn');
nextBtn.addEventListener('touchstart', e => { e.preventDefault(); nextFruit(); }, { passive: false });
nextBtn.addEventListener('click', nextFruit);

checkImages().then(found => {
  fruits = found;
  startRound();
});
</script>
</body>
</html>
