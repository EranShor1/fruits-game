<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>חידון פירות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background:
    radial-gradient(ellipse at 20% 10%, #c9e8ff 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, #d4c9ff 0%, transparent 55%),
    linear-gradient(160deg, #e8f4ff 0%, #f0ebff 50%, #e0f0ff 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
}

/* soft bokeh blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(60px);
}
body::before {
  width: 280px; height: 280px;
  top: -60px; right: -60px;
  background: rgba(120,180,255,0.35);
}
body::after {
  width: 240px; height: 240px;
  bottom: 60px; left: -40px;
  background: rgba(180,140,255,0.3);
}

#app {
  width: 360px;
  height: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* ── iOS status-bar style topbar ── */
#topbar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px 8px;
}

#hearts { font-size: 26px; letter-spacing: 3px; }

#score {
  font-size: 19px;
  font-weight: 900;
  color: #1a73e8;
  background: rgba(255,255,255,0.65);
  border: 1px solid rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 4px 14px;
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(0,100,220,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
}

/* ── Fruit image: frosted card ── */
#fruit-img-wrap {
  margin-top: 18px;
  padding: 8px;
  background: rgba(255,255,255,0.55);
  border: 1.5px solid rgba(255,255,255,0.85);
  border-radius: 32px;
  box-shadow:
    0 8px 32px rgba(100,150,255,0.18),
    0 2px 8px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#fruit-img {
  width: 204px;
  height: 204px;
  object-fit: cover;
  border-radius: 24px;
  display: block;
}

#fruit-name {
  margin-top: 10px;
  text-align: center;
  height: 54px;
  visibility: hidden;
}
#fruit-name .he {
  font-size: 28px;
  font-weight: 900;
  color: #1a1a2e;
  text-shadow: 0 1px 2px rgba(255,255,255,0.7);
}
#fruit-name .en { font-size: 15px; color: #6b7a99; margin-top: 2px; }

#question {
  margin-top: 14px;
  font-size: 22px;
  font-weight: 700;
  color: #1a1a2e;
}

/* ── Answer buttons: iOS glass ── */
#answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 18px;
  padding: 0 18px;
  width: 100%;
}

.ans-btn {
  background: rgba(255,255,255,0.62);
  border: 1.5px solid rgba(255,255,255,0.88);
  border-radius: 20px;
  padding: 20px 8px;
  font-family: 'Heebo', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #1a1a2e;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  touch-action: manipulation;
  box-shadow:
    0 4px 18px rgba(100,150,255,0.12),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(0,0,0,0.04);
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}

.ans-btn:active { transform: scale(0.96); }

.ans-btn.correct {
  background: rgba(52,199,89,0.45);
  border-color: rgba(52,199,89,0.7);
  box-shadow: 0 4px 20px rgba(52,199,89,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
  animation: popGreen 0.35s ease-out;
}

.ans-btn.wrong {
  background: rgba(255,59,48,0.35);
  border-color: rgba(255,59,48,0.6);
  box-shadow: 0 4px 18px rgba(255,59,48,0.2);
  animation: shake 0.38s ease-out;
}

@keyframes popGreen {
  0%   { background: rgba(52,199,89,0.75); transform: scale(1.06); }
  100% { background: rgba(52,199,89,0.45); transform: scale(1); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-9px); }
  40%     { transform: translateX(9px); }
  60%     { transform: translateX(-6px); }
  80%     { transform: translateX(6px); }
}

/* ── Next button: iOS blue pill ── */
#next-btn {
  margin-top: 22px;
  padding: 15px 44px;
  background: linear-gradient(180deg, #3a9eff 0%, #1a73e8 100%);
  color: #fff;
  border: none;
  border-radius: 36px;
  font-family: 'Heebo', sans-serif;
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
  box-shadow:
    0 6px 20px rgba(26,115,232,0.45),
    inset 0 1px 0 rgba(255,255,255,0.3);
  display: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  letter-spacing: -0.3px;
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="hearts"></div>
    <div id="score">⭐ 0</div>
  </div>
  <div id="fruit-img-wrap">
    <img id="fruit-img" src="" alt="fruit">
  </div>
  <div id="fruit-name">
    <div class="he"></div>
    <div class="en"></div>
  </div>
  <div id="question">מה הפרי הזה?</div>
  <div id="answers"></div>
  <button id="next-btn">← הפרי הבא</button>
</div>

<script>
const ALL_FRUITS = [
  { file:'mango.jpg',        he:'מנגו',       en:'Mango' },
  { file:'dragonfruit.jpg',  he:'פיטאיה',     en:'Dragon Fruit' },
  { file:'rambutan.jpg',     he:'רמבוטן',     en:'Rambutan' },
  { file:'lychee.jpg',       he:'ליצ\'י',     en:'Lychee' },
  { file:'starfruit.jpg',    he:'קרמבולה',    en:'Starfruit' },
  { file:'papaya.jpg',       he:'פפאיה',      en:'Papaya' },
  { file:'guava.jpg',        he:'גויאבה',     en:'Guava' },
  { file:'passionfruit.jpg', he:'פסיפלורה',   en:'Passion Fruit' },
  { file:'mangosteen.jpg',   he:'מנגוסטין',   en:'Mangosteen' },
  { file:'longan.jpg',       he:'לונגן',      en:'Longan' },
  { file:'jackfruit.jpg',    he:'ג\'קפרוט',   en:'Jackfruit' },
  { file:'durian.jpg',       he:'דוריאן',     en:'Durian' },
  { file:'feijoa.jpg',       he:'פיג\'ואה',   en:'Feijoa' },
  { file:'persimmon.jpg',    he:'פרסימון',    en:'Persimmon' },
  { file:'nashi.jpg',        he:'נאשי',       en:'Nashi Pear' },
  { file:'kumquat.jpg',      he:'קומקווט',    en:'Kumquat' },
  { file:'pomelo.jpg',       he:'פומלה',      en:'Pomelo' },
  { file:'etrog.jpg',        he:'אתרוג',      en:'Etrog' },
  { file:'pricklypear.jpg',  he:'סברס',       en:'Prickly Pear' },
  { file:'date.jpg',         he:'תמר',        en:'Date' },
  { file:'fig.jpg',          he:'תאנה',       en:'Fig' },
  { file:'pomegranate.jpg',  he:'רימון',      en:'Pomegranate' },
  { file:'quince.jpg',       he:'חבוש',       en:'Quince' },
  { file:'acai.jpg',         he:'אסאי',       en:'Açaí' },
  { file:'pineapple.jpg',    he:'אננס',       en:'Pineapple' },
  { file:'coconut.jpg',      he:'קוקוס',      en:'Coconut' },
  { file:'kiwi.jpg',         he:'קיווי',      en:'Kiwi' },
  { file:'avocado.jpg',      he:'אבוקדו',     en:'Avocado' },
  { file:'lucuma.jpg',       he:'לוקומה',     en:'Lucuma' },
  { file:'sapodilla.jpg',    he:'ספדילה',     en:'Sapodilla' },
  { file:'loquat.jpg',       he:'שסק',        en:'Loquat' },
  { file:'banana.jpg',       he:'בננה',       en:'Banana' },
  { file:'raspberry.jpg',    he:'פטל',        en:'Raspberry' },
  { file:'blueberry.jpg',    he:'אוכמניות',   en:'Blueberry' },
  { file:'cherry.jpg',       he:'דובדבן',     en:'Cherry' },
];

let fruits = [], queue = [], current;
let hearts = 3, score = 0, locked = false;

function checkImages() {
  return Promise.all(ALL_FRUITS.map(f => new Promise(res => {
    const img = new Image();
    img.onload  = () => res(f);
    img.onerror = () => res(null);
    img.src = 'Images/' + f.file;
  }))).then(r => r.filter(Boolean));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextFromQueue() {
  if (!queue.length) queue = shuffle([...fruits]);
  return queue.pop();
}

function startRound() {
  hearts = 3;
  locked = false;
  current = nextFromQueue();

  updateHearts();
  document.getElementById('fruit-img').src = 'Images/' + current.file;
  document.getElementById('fruit-name').style.visibility = 'hidden';
  document.getElementById('next-btn').style.display = 'none';

  const pool = shuffle(fruits.filter(f => f !== current));
  const options = shuffle([current, ...pool.slice(0, 3)]);

  const container = document.getElementById('answers');
  container.innerHTML = '';
  options.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = f.he;
    btn.addEventListener('touchstart', e => { e.preventDefault(); tap(btn, f); }, { passive: false });
    btn.addEventListener('click', () => tap(btn, f));
    container.appendChild(btn);
  });
}

function updateHearts() {
  document.getElementById('hearts').textContent =
    '❤️'.repeat(hearts) + '🤍'.repeat(3 - hearts);
}

function tap(btn, fruit) {
  if (locked) return;
  if (fruit === current) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = '⭐ ' + score;
    locked = true;
    reveal();
    document.getElementById('next-btn').style.display = 'block';
  } else {
    btn.classList.add('wrong');
    hearts--;
    updateHearts();
    setTimeout(() => btn.classList.remove('wrong'), 400);
    if (hearts === 0) {
      locked = true;
      reveal();
      document.getElementById('next-btn').style.display = 'block';
    }
  }
}

function reveal() {
  const el = document.getElementById('fruit-name');
  el.querySelector('.he').textContent = current.he;
  el.querySelector('.en').textContent = current.en;
  el.style.visibility = 'visible';
}

function nextFruit() { startRound(); }

const nextBtn = document.getElementById('next-btn');
nextBtn.addEventListener('touchstart', e => { e.preventDefault(); nextFruit(); }, { passive: false });
nextBtn.addEventListener('click', nextFruit);

checkImages().then(found => {
  fruits = found;
  startRound();
});
</script>
</body>
</html>
