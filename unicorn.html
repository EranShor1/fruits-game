<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>חידון פירות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(160deg, #ffe0f7 0%, #e8d5ff 35%, #d0eeff 70%, #ffd6f0 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
}

/* Rising sparkles */
.sparkle {
  position: fixed;
  pointer-events: none;
  animation: floatUp linear infinite;
  z-index: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
  100% { transform: translateY(-820px) rotate(360deg); opacity: 0; }
}

#app {
  width: 360px;
  height: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* ── Top bar ── */
#topbar {
  width: 100%;
  padding: 14px 20px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 2;
}

#hearts { display: flex; gap: 4px; font-size: 22px; }

#score {
  background: linear-gradient(135deg, #ff9de2, #c77dff);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  box-shadow: 0 4px 12px rgba(199,125,255,0.45);
}

/* ── Title row with unicorn + rainbow ── */
.title-row {
  width: 340px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 2px;
  position: relative;
  z-index: 2;
}

.title-rainbow {
  font-size: 58px;
  line-height: 1;
  filter: drop-shadow(0 3px 10px rgba(255,100,200,0.5));
}

.title-label {
  font-size: 20px;
  color: #c77dff;
  font-weight: 900;
  padding-bottom: 10px;
  text-shadow: 0 0 12px rgba(199,125,255,0.5);
  text-align: center;
}

.title-horse {
  font-size: 72px;
  line-height: 1;
  filter: drop-shadow(0 4px 14px rgba(199,125,255,0.6));
  animation: horseWiggle 3s ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes horseWiggle {
  0%,100% { transform: rotate(-4deg) translateY(0); }
  50%      { transform: rotate(4deg) translateY(-5px); }
}

/* ── Photo with animated rainbow ring + orbiting sparkles ── */
.photo-container {
  margin: 2px 0 8px;
  position: relative;
  z-index: 2;
}

.photo-ring {
  width: 228px;
  height: 228px;
  border-radius: 50%;
  padding: 5px;
  animation: colorSpin 5s linear infinite;
}
@keyframes colorSpin {
  0%   { background: linear-gradient(0deg,   #ff6ed8,#c77dff,#85d4ff,#ffe066); box-shadow: 0 0 28px rgba(255,110,216,0.5); }
  25%  { background: linear-gradient(90deg,  #ff6ed8,#c77dff,#85d4ff,#ffe066); box-shadow: 0 0 28px rgba(133,212,255,0.5); }
  50%  { background: linear-gradient(180deg, #ff6ed8,#c77dff,#85d4ff,#ffe066); box-shadow: 0 0 28px rgba(255,224,102,0.5); }
  75%  { background: linear-gradient(270deg, #ff6ed8,#c77dff,#85d4ff,#ffe066); box-shadow: 0 0 28px rgba(199,125,255,0.5); }
  100% { background: linear-gradient(360deg, #ff6ed8,#c77dff,#85d4ff,#ffe066); box-shadow: 0 0 28px rgba(255,110,216,0.5); }
}

.photo-frame {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: white;
  overflow: hidden;
}

#fruit-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Orbiting sparkles */
.orbit {
  position: absolute;
  top: -16px; left: -16px;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  animation: spin 9s linear infinite;
  pointer-events: none;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.orbit span { position: absolute; font-size: 15px; }

#fruit-name {
  margin-top: 4px;
  text-align: center;
  height: 54px;
  visibility: hidden;
  position: relative;
  z-index: 2;
}
#fruit-name .he {
  font-size: 26px;
  font-weight: 900;
  background: linear-gradient(90deg, #e879f9, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: #a855f7;
}
#fruit-name .en { font-size: 14px; color: #b08acf; margin-top: 2px; }

#question {
  font-size: 17px;
  font-weight: 700;
  color: #8b5cf6;
  text-align: center;
  margin-bottom: 12px;
  text-shadow: 0 1px 4px rgba(139,92,246,0.2);
  position: relative;
  z-index: 2;
}

#answers {
  width: 320px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
  position: relative;
  z-index: 2;
}

.ans-btn {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 2.5px solid rgba(199,125,255,0.4);
  border-radius: 20px;
  padding: 16px 10px;
  font-family: 'Heebo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #7c3aed;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  box-shadow: 0 4px 12px rgba(199,125,255,0.18);
  transition: all 0.15s;
}
.ans-btn:active { transform: scale(0.96); }

.ans-btn.correct {
  background: linear-gradient(135deg, #a8edca, #6dd5a8);
  border-color: #4ade80;
  color: #065f46;
  box-shadow: 0 4px 16px rgba(74,222,128,0.4);
  animation: sparkleCorrect 0.35s ease-out;
}

.ans-btn.wrong {
  background: rgba(254,202,202,0.7);
  border-color: rgba(248,113,113,0.8);
  color: #991b1b;
  animation: shake 0.38s ease-out;
}

@keyframes sparkleCorrect {
  0%   { transform: scale(1.08); box-shadow: 0 0 30px rgba(74,222,128,0.6); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-9px); }
  40%     { transform: translateX(9px); }
  60%     { transform: translateX(-6px); }
  80%     { transform: translateX(6px); }
}

.magic-divider {
  font-size: 15px;
  letter-spacing: 6px;
  margin: 2px 0 10px;
  opacity: 0.65;
  position: relative;
  z-index: 2;
}

#next-btn {
  width: 320px;
  background: linear-gradient(90deg, #ff9de2, #c77dff, #85d4ff);
  border: none;
  border-radius: 24px;
  padding: 17px;
  font-family: 'Heebo', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: white;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  box-shadow: 0 6px 20px rgba(199,125,255,0.5);
  position: relative;
  z-index: 2;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  display: none;
}
</style>
</head>
<body>

<!-- Rising sparkles -->
<div class="sparkle" style="left:20px;top:700px;font-size:13px;animation-duration:6s;animation-delay:0s">✨</div>
<div class="sparkle" style="left:75px;top:750px;font-size:9px;animation-duration:8s;animation-delay:1.2s">⭐</div>
<div class="sparkle" style="left:300px;top:720px;font-size:12px;animation-duration:7s;animation-delay:2s">💫</div>
<div class="sparkle" style="left:330px;top:680px;font-size:8px;animation-duration:5s;animation-delay:0.5s">✨</div>
<div class="sparkle" style="left:160px;top:760px;font-size:15px;animation-duration:9s;animation-delay:3s">🌟</div>
<div class="sparkle" style="left:50px;top:640px;font-size:10px;animation-duration:7.5s;animation-delay:4s">💜</div>
<div class="sparkle" style="left:260px;top:650px;font-size:11px;animation-duration:6.5s;animation-delay:1.8s">🌸</div>

<div id="app">
  <div id="topbar">
    <div id="hearts"></div>
    <div id="score">🦄 0</div>
  </div>

  <div class="title-row">
    <div class="title-horse">🦄</div>
    <div class="title-label">חידון הפירות</div>
    <div class="title-rainbow">🌈</div>
  </div>

  <div class="photo-container">
    <div class="photo-ring">
      <div class="photo-frame">
        <img id="fruit-img" src="" alt="fruit">
      </div>
    </div>
    <div class="orbit">
      <span style="top:0;left:50%;transform:translateX(-50%)">✨</span>
      <span style="top:50%;right:-4px;transform:translateY(-50%)">💫</span>
      <span style="bottom:0;left:50%;transform:translateX(-50%)">⭐</span>
      <span style="top:50%;left:-4px;transform:translateY(-50%)">🌟</span>
      <span style="top:8%;right:12%">✨</span>
      <span style="bottom:8%;left:12%">💫</span>
    </div>
  </div>

  <div id="fruit-name">
    <div class="he"></div>
    <div class="en"></div>
  </div>
  <div id="question">✨ מה הפרי הזה? ✨</div>
  <div id="answers"></div>
  <div class="magic-divider">🌸 💜 🌸</div>
  <button id="next-btn">🦄 ← הפרי הבא 🌈</button>
</div>

<script>
const ALL_FRUITS = [
  { file:'mango.jpg',        he:'מנגו',       en:'Mango' },
  { file:'dragonfruit.jpg',  he:'פיטאיה',     en:'Dragon Fruit' },
  { file:'rambutan.jpg',     he:'רמבוטן',     en:'Rambutan' },
  { file:'lychee.jpg',       he:'ליצ\'י',     en:'Lychee' },
  { file:'starfruit.jpg',    he:'קרמבולה',    en:'Starfruit' },
  { file:'papaya.jpg',       he:'פפאיה',      en:'Papaya' },
  { file:'guava.jpg',        he:'גויאבה',     en:'Guava' },
  { file:'passionfruit.jpg', he:'פסיפלורה',   en:'Passion Fruit' },
  { file:'mangosteen.jpg',   he:'מנגוסטין',   en:'Mangosteen' },
  { file:'longan.jpg',       he:'לונגן',      en:'Longan' },
  { file:'jackfruit.jpg',    he:'ג\'קפרוט',   en:'Jackfruit' },
  { file:'durian.jpg',       he:'דוריאן',     en:'Durian' },
  { file:'feijoa.jpg',       he:'פיג\'ואה',   en:'Feijoa' },
  { file:'persimmon.jpg',    he:'פרסימון',    en:'Persimmon' },
  { file:'nashi.jpg',        he:'נאשי',       en:'Nashi Pear' },
  { file:'kumquat.jpg',      he:'קומקווט',    en:'Kumquat' },
  { file:'pomelo.jpg',       he:'פומלה',      en:'Pomelo' },
  { file:'etrog.jpg',        he:'אתרוג',      en:'Etrog' },
  { file:'pricklypear.jpg',  he:'סברס',       en:'Prickly Pear' },
  { file:'date.jpg',         he:'תמר',        en:'Date' },
  { file:'fig.jpg',          he:'תאנה',       en:'Fig' },
  { file:'pomegranate.jpg',  he:'רימון',      en:'Pomegranate' },
  { file:'quince.jpg',       he:'חבוש',       en:'Quince' },
  { file:'acai.jpg',         he:'אסאי',       en:'Açaí' },
  { file:'pineapple.jpg',    he:'אננס',       en:'Pineapple' },
  { file:'coconut.jpg',      he:'קוקוס',      en:'Coconut' },
  { file:'kiwi.jpg',         he:'קיווי',      en:'Kiwi' },
  { file:'avocado.jpg',      he:'אבוקדו',     en:'Avocado' },
  { file:'lucuma.jpg',       he:'לוקומה',     en:'Lucuma' },
  { file:'sapodilla.jpg',    he:'ספדילה',     en:'Sapodilla' },
  { file:'loquat.jpg',       he:'שסק',        en:'Loquat' },
  { file:'banana.jpg',       he:'בננה',       en:'Banana' },
  { file:'raspberry.jpg',    he:'פטל',        en:'Raspberry' },
  { file:'blueberry.jpg',    he:'אוכמניות',   en:'Blueberry' },
  { file:'cherry.jpg',       he:'דובדבן',     en:'Cherry' },
];

let fruits = [], queue = [], current;
let hearts = 3, score = 0, locked = false;

function checkImages() {
  return Promise.all(ALL_FRUITS.map(f => new Promise(res => {
    const img = new Image();
    img.onload  = () => res(f);
    img.onerror = () => res(null);
    img.src = 'Images/' + f.file;
  }))).then(r => r.filter(Boolean));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextFromQueue() {
  if (!queue.length) queue = shuffle([...fruits]);
  return queue.pop();
}

function startRound() {
  hearts = 3;
  locked = false;
  current = nextFromQueue();

  updateHearts();
  document.getElementById('fruit-img').src = 'Images/' + current.file;
  document.getElementById('fruit-name').style.visibility = 'hidden';
  document.getElementById('next-btn').style.display = 'none';

  const pool = shuffle(fruits.filter(f => f !== current));
  const options = shuffle([current, ...pool.slice(0, 3)]);

  const container = document.getElementById('answers');
  container.innerHTML = '';
  options.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = f.he;
    btn.addEventListener('touchstart', e => { e.preventDefault(); tap(btn, f); }, { passive: false });
    btn.addEventListener('click', () => tap(btn, f));
    container.appendChild(btn);
  });
}

function updateHearts() {
  document.getElementById('hearts').textContent =
    '💜'.repeat(hearts) + '🤍'.repeat(3 - hearts);
}

function tap(btn, fruit) {
  if (locked) return;
  if (fruit === current) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = '🦄 ' + score;
    locked = true;
    reveal();
    document.getElementById('next-btn').style.display = 'block';
  } else {
    btn.classList.add('wrong');
    hearts--;
    updateHearts();
    setTimeout(() => btn.classList.remove('wrong'), 400);
    if (hearts === 0) {
      locked = true;
      reveal();
      document.getElementById('next-btn').style.display = 'block';
    }
  }
}

function reveal() {
  const el = document.getElementById('fruit-name');
  el.querySelector('.he').textContent = current.he;
  el.querySelector('.en').textContent = current.en;
  el.style.visibility = 'visible';
}

function nextFruit() { startRound(); }

const nextBtn = document.getElementById('next-btn');
nextBtn.addEventListener('touchstart', e => { e.preventDefault(); nextFruit(); }, { passive: false });
nextBtn.addEventListener('click', nextFruit);

checkImages().then(found => {
  fruits = found;
  startRound();
});
</script>
</body>
</html>
