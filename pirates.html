<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>חידון פירות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background:
    radial-gradient(ellipse at 50% 0%, #1a3a2a 0%, transparent 60%),
    linear-gradient(180deg, #0d1f17 0%, #0a1a10 40%, #050d08 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
}

/* rope border left+right */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  border: 10px solid transparent;
  border-image: repeating-linear-gradient(
    45deg,
    #6b4a1a 0px, #6b4a1a 8px,
    #3d2a0a 8px, #3d2a0a 16px
  ) 10;
  z-index: 10;
}

/* fog/mist at top */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, rgba(180,220,200,0.06) 0%, transparent 100%);
  pointer-events: none;
  z-index: 1;
}

#app {
  width: 360px;
  height: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 2;
}

/* ── Topbar with skull-and-crossbones vibe ── */
#topbar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px 8px;
}

#hearts { font-size: 26px; letter-spacing: 3px; }

#score {
  font-size: 19px;
  font-weight: 900;
  color: #f5d77a;
  background: linear-gradient(135deg, #2a1a08 0%, #3d2a0a 100%);
  border: 2px solid #8b6914;
  padding: 4px 14px;
  border-radius: 8px;
  box-shadow:
    0 0 12px rgba(200,160,30,0.3),
    inset 0 1px 0 rgba(255,220,80,0.15);
  text-shadow: 0 0 8px rgba(245,215,120,0.6);
}

/* ── Fruit image: treasure-chest frame ── */
#fruit-img-wrap {
  margin-top: 18px;
  padding: 10px;
  background: linear-gradient(145deg, #3d2a0a 0%, #1e1408 100%);
  border: 3px solid #8b6914;
  border-radius: 16px;
  box-shadow:
    0 0 0 1px #5a4210,
    0 0 20px rgba(180,130,20,0.35),
    0 12px 40px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,200,60,0.12);
  position: relative;
}

/* corner rivets */
#fruit-img-wrap::before,
#fruit-img-wrap::after {
  content: '⚓';
  font-size: 14px;
  position: absolute;
  color: #8b6914;
  opacity: 0.7;
}
#fruit-img-wrap::before { top: 4px; right: 6px; }
#fruit-img-wrap::after  { bottom: 4px; left: 6px; }

#fruit-img {
  width: 204px;
  height: 204px;
  object-fit: cover;
  border-radius: 10px;
  display: block;
  filter: saturate(1.1) contrast(1.05);
}

#fruit-name {
  margin-top: 10px;
  text-align: center;
  height: 54px;
  visibility: hidden;
}
#fruit-name .he {
  font-size: 28px;
  font-weight: 900;
  color: #f5d77a;
  text-shadow: 0 0 12px rgba(245,215,120,0.5), 0 2px 4px rgba(0,0,0,0.6);
}
#fruit-name .en { font-size: 15px; color: #8a7a50; margin-top: 2px; }

#question {
  margin-top: 14px;
  font-size: 22px;
  font-weight: 700;
  color: #c8b07a;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* ── Answer buttons: aged parchment planks ── */
#answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 18px;
  padding: 0 18px;
  width: 100%;
}

.ans-btn {
  background: linear-gradient(160deg, #2e1f0a 0%, #1e1408 100%);
  border: 2px solid #6b4a1a;
  border-radius: 12px;
  padding: 20px 8px;
  font-family: 'Heebo', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #d4b870;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  box-shadow:
    0 4px 14px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(200,160,60,0.1),
    inset 0 -1px 0 rgba(0,0,0,0.3);
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  transition: transform 0.12s ease;
  position: relative;
}

.ans-btn:active { transform: scale(0.96); }

.ans-btn.correct {
  background: linear-gradient(160deg, #1a3a1a 0%, #0d2210 100%);
  border-color: #4a9a30;
  box-shadow: 0 0 18px rgba(74,154,48,0.4), 0 4px 14px rgba(0,0,0,0.5);
  color: #7dd65a;
  text-shadow: 0 0 8px rgba(125,214,90,0.5);
  animation: treasureFound 0.35s ease-out;
}

.ans-btn.wrong {
  background: linear-gradient(160deg, #3a0a0a 0%, #220808 100%);
  border-color: #9a2020;
  box-shadow: 0 0 14px rgba(180,30,30,0.3), 0 4px 14px rgba(0,0,0,0.5);
  animation: shake 0.38s ease-out;
}

@keyframes treasureFound {
  0%   { transform: scale(1.06); box-shadow: 0 0 30px rgba(200,160,30,0.6); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-9px); }
  40%     { transform: translateX(9px); }
  60%     { transform: translateX(-6px); }
  80%     { transform: translateX(6px); }
}

/* ── Next button: gold plank ── */
#next-btn {
  margin-top: 22px;
  padding: 15px 44px;
  background: linear-gradient(135deg, #c8960a 0%, #8b6504 100%);
  color: #fff8e0;
  border: 2px solid #f0c030;
  border-radius: 10px;
  font-family: 'Heebo', sans-serif;
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
  box-shadow:
    0 0 20px rgba(200,150,10,0.4),
    0 5px 18px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,230,100,0.3);
  display: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="hearts"></div>
    <div id="score">⭐ 0</div>
  </div>
  <div id="fruit-img-wrap">
    <img id="fruit-img" src="" alt="fruit">
  </div>
  <div id="fruit-name">
    <div class="he"></div>
    <div class="en"></div>
  </div>
  <div id="question">מה הפרי הזה?</div>
  <div id="answers"></div>
  <button id="next-btn">← הפרי הבא</button>
</div>

<script>
const ALL_FRUITS = [
  { file:'mango.jpg',        he:'מנגו',       en:'Mango' },
  { file:'dragonfruit.jpg',  he:'פיטאיה',     en:'Dragon Fruit' },
  { file:'rambutan.jpg',     he:'רמבוטן',     en:'Rambutan' },
  { file:'lychee.jpg',       he:'ליצ\'י',     en:'Lychee' },
  { file:'starfruit.jpg',    he:'קרמבולה',    en:'Starfruit' },
  { file:'papaya.jpg',       he:'פפאיה',      en:'Papaya' },
  { file:'guava.jpg',        he:'גויאבה',     en:'Guava' },
  { file:'passionfruit.jpg', he:'פסיפלורה',   en:'Passion Fruit' },
  { file:'mangosteen.jpg',   he:'מנגוסטין',   en:'Mangosteen' },
  { file:'longan.jpg',       he:'לונגן',      en:'Longan' },
  { file:'jackfruit.jpg',    he:'ג\'קפרוט',   en:'Jackfruit' },
  { file:'durian.jpg',       he:'דוריאן',     en:'Durian' },
  { file:'feijoa.jpg',       he:'פיג\'ואה',   en:'Feijoa' },
  { file:'persimmon.jpg',    he:'פרסימון',    en:'Persimmon' },
  { file:'nashi.jpg',        he:'נאשי',       en:'Nashi Pear' },
  { file:'kumquat.jpg',      he:'קומקווט',    en:'Kumquat' },
  { file:'pomelo.jpg',       he:'פומלה',      en:'Pomelo' },
  { file:'etrog.jpg',        he:'אתרוג',      en:'Etrog' },
  { file:'pricklypear.jpg',  he:'סברס',       en:'Prickly Pear' },
  { file:'date.jpg',         he:'תמר',        en:'Date' },
  { file:'fig.jpg',          he:'תאנה',       en:'Fig' },
  { file:'pomegranate.jpg',  he:'רימון',      en:'Pomegranate' },
  { file:'quince.jpg',       he:'חבוש',       en:'Quince' },
  { file:'acai.jpg',         he:'אסאי',       en:'Açaí' },
  { file:'pineapple.jpg',    he:'אננס',       en:'Pineapple' },
  { file:'coconut.jpg',      he:'קוקוס',      en:'Coconut' },
  { file:'kiwi.jpg',         he:'קיווי',      en:'Kiwi' },
  { file:'avocado.jpg',      he:'אבוקדו',     en:'Avocado' },
  { file:'lucuma.jpg',       he:'לוקומה',     en:'Lucuma' },
  { file:'sapodilla.jpg',    he:'ספדילה',     en:'Sapodilla' },
  { file:'loquat.jpg',       he:'שסק',        en:'Loquat' },
  { file:'banana.jpg',       he:'בננה',       en:'Banana' },
  { file:'raspberry.jpg',    he:'פטל',        en:'Raspberry' },
  { file:'blueberry.jpg',    he:'אוכמניות',   en:'Blueberry' },
  { file:'cherry.jpg',       he:'דובדבן',     en:'Cherry' },
];

let fruits = [], queue = [], current;
let hearts = 3, score = 0, locked = false;

function checkImages() {
  return Promise.all(ALL_FRUITS.map(f => new Promise(res => {
    const img = new Image();
    img.onload  = () => res(f);
    img.onerror = () => res(null);
    img.src = 'Images/' + f.file;
  }))).then(r => r.filter(Boolean));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextFromQueue() {
  if (!queue.length) queue = shuffle([...fruits]);
  return queue.pop();
}

function startRound() {
  hearts = 3;
  locked = false;
  current = nextFromQueue();

  updateHearts();
  document.getElementById('fruit-img').src = 'Images/' + current.file;
  document.getElementById('fruit-name').style.visibility = 'hidden';
  document.getElementById('next-btn').style.display = 'none';

  const pool = shuffle(fruits.filter(f => f !== current));
  const options = shuffle([current, ...pool.slice(0, 3)]);

  const container = document.getElementById('answers');
  container.innerHTML = '';
  options.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = f.he;
    btn.addEventListener('touchstart', e => { e.preventDefault(); tap(btn, f); }, { passive: false });
    btn.addEventListener('click', () => tap(btn, f));
    container.appendChild(btn);
  });
}

function updateHearts() {
  document.getElementById('hearts').textContent =
    '❤️'.repeat(hearts) + '🤍'.repeat(3 - hearts);
}

function tap(btn, fruit) {
  if (locked) return;
  if (fruit === current) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = '⭐ ' + score;
    locked = true;
    reveal();
    document.getElementById('next-btn').style.display = 'block';
  } else {
    btn.classList.add('wrong');
    hearts--;
    updateHearts();
    setTimeout(() => btn.classList.remove('wrong'), 400);
    if (hearts === 0) {
      locked = true;
      reveal();
      document.getElementById('next-btn').style.display = 'block';
    }
  }
}

function reveal() {
  const el = document.getElementById('fruit-name');
  el.querySelector('.he').textContent = current.he;
  el.querySelector('.en').textContent = current.en;
  el.style.visibility = 'visible';
}

function nextFruit() { startRound(); }

const nextBtn = document.getElementById('next-btn');
nextBtn.addEventListener('touchstart', e => { e.preventDefault(); nextFruit(); }, { passive: false });
nextBtn.addEventListener('click', nextFruit);

checkImages().then(found => {
  fruits = found;
  startRound();
});
</script>
</body>
</html>
